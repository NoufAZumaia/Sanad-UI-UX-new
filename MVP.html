<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sanad MVP — خطة المنتج الأولي</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #F5F3EE;
    --bg-2: #EDE9DD;
    --surface: #FFFFFF;
    --surface-2: #FBF9F4;
    --border: #E5E0D2;
    --border-strong: #D7D0BC;
    --ink: #0F1414;
    --ink-2: #5C625F;
    --ink-3: #8A908C;
    --primary: #0F766E;
    --primary-deep: #0B5A55;
    --primary-soft: #CCFBF1;
    --primary-tint: #F0FDFA;
    --accent: #C9B79C;
    --accent-soft: #F0E9D9;
    --success: #047857;
    --success-soft: #D1FADF;
    --warn: #B45309;
    --warn-soft: #FEF3C7;
    --danger: #B91C1C;
    --danger-soft: #FECACA;
    --info: #1E3A8A;
    --info-soft: #DBE4FF;
    --fazaa: #0F766E;
    --jalees: #7A5A36;
    --academic: #1E3A8A;
    --murafaqa: #7A1E55;
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    direction: rtl;
  }
  * { box-sizing: border-box; }
  button { font: inherit; color: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  .num { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }
  .latin { font-family: 'IBM Plex Sans', 'IBM Plex Sans Arabic', system-ui; }

  /* Nav */
  .nav-header {
    grid-column: 1 / -1;
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    gap: 20px; padding: 12px 24px;
    background: linear-gradient(135deg, #0F766E 0%, #0B5A55 100%);
    border-bottom: 2px solid #063D39;
    box-shadow: 0 4px 12px rgba(15, 118, 110, 0.15);
  }
  .nav-link {
    padding: 8px 16px; border-radius: 8px; text-decoration: none;
    background: transparent;
    color: #fff; font-weight: 500; font-size: 14px;
    border: 1px solid transparent;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .nav-link:hover { background: rgba(255,255,255,0.15); }
  .nav-link.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.5); font-weight: 600; }

  /* Layout */
  .page-wrap { max-width: 1200px; margin: 0 auto; padding: 36px 28px 80px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; }
  .card-pad { padding: 22px; }
  .card-head { display: flex; align-items: center; gap: 12px; padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .card-head h2, .card-head h3 { margin: 0; font-weight: 600; }
  .card-head h2 { font-size: 17px; }
  .card-head h3 { font-size: 15px; }
  .card-head .sub { color: var(--ink-2); font-size: 12px; margin-inline-start: 4px; }
  .card-head .actions { margin-inline-start: auto; display: flex; gap: 8px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); font-weight: 500; font-size: 13px; transition: all .15s; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn.sm { padding: 5px 12px; font-size: 12px; border-radius: 9px; }

  /* Pills */
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 500; }
  .pill .d { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .pill.new     { background: var(--info-soft); color: var(--info); }
  .pill.wait    { background: var(--warn-soft); color: var(--warn); }
  .pill.assigned{ background: #FEF9C3; color: #92400E; }
  .pill.live    { background: var(--primary-soft); color: var(--primary-deep); }
  .pill.done    { background: var(--success-soft); color: var(--success); }
  .pill.cancel  { background: var(--danger-soft); color: var(--danger); }
  .pill.reject  { background: #F5E6E5; color: var(--danger); }
  .pill.on      { background: var(--success-soft); color: var(--success); }
  .pill.post    { background: var(--bg-2); color: var(--ink-3); }
  .pill.user-c  { background: #DBE4FF; color: #1E3A8A; }
  .pill.prov-c  { background: #FEF3C7; color: #92400E; }
  .pill.admin-c { background: var(--primary-soft); color: var(--primary-deep); }

  /* Section heading */
  .sec-title { font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; margin: 0 0 6px; }
  .sec-sub   { font-size: 13.5px; color: var(--ink-2); line-height: 1.7; margin: 0 0 22px; }

  /* Grids */
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  @media (max-width: 860px) { .grid-3 { grid-template-columns: 1fr; } }
  @media (max-width: 680px) { .grid-2 { grid-template-columns: 1fr; } .page-wrap { padding: 20px 16px 60px; } }

  /* Feature list inside card */
  .feat-list { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 0; }
  .feat-list li { display: flex; align-items: flex-start; gap: 10px; padding: 11px 18px; border-bottom: 1px solid var(--border); font-size: 13.5px; line-height: 1.6; }
  .feat-list li:last-child { border-bottom: none; }
  .feat-list li .icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }

  /* Flow steps */
  .flow-wrap { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .flow-step { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; display: flex; flex-direction: column; gap: 4px; min-width: 130px; flex: 1; position: relative; }
  .flow-step .num-badge { width: 26px; height: 26px; border-radius: 8px; background: var(--primary); color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }
  .flow-step .step-title { font-size: 13px; font-weight: 600; color: var(--ink); }
  .flow-step .step-sub   { font-size: 11.5px; color: var(--ink-3); line-height: 1.5; }
  .flow-arrow { color: var(--ink-3); font-size: 18px; flex-shrink: 0; }
  @media (max-width: 680px) { .flow-wrap { flex-direction: column; } .flow-arrow { transform: rotate(90deg); } }

  /* Priority table */
  table.tbl { width: 100%; border-collapse: collapse; }
  .tbl th { text-align: right; font-size: 11px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .8px; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
  .tbl td { padding: 13px 18px; border-bottom: 1px solid var(--border); font-size: 13.5px; vertical-align: top; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: var(--surface-2); }

  /* Service cards */
  .svc-dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; flex-shrink: 0; }

  /* Section divider */
  .section-gap { margin-bottom: 44px; }

  /* Post-MVP chips */
  .postmvp-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 20px 22px; }
  .postmvp-chip { display: inline-flex; align-items: center; gap: 7px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 13px; color: var(--ink-2); }

  /* Hero banner */
  .mvp-hero { background: linear-gradient(135deg, #0F766E 0%, #0B5A55 60%, #063D39 100%); border-radius: 22px; padding: 32px 36px; color: #fff; margin-bottom: 44px; position: relative; overflow: hidden; }
  .mvp-hero::before { content: ''; position: absolute; top: -40px; left: -40px; width: 220px; height: 220px; border-radius: 999px; background: rgba(255,255,255,0.05); }
  .mvp-hero::after  { content: ''; position: absolute; bottom: -60px; right: 60px; width: 160px; height: 160px; border-radius: 999px; background: rgba(255,255,255,0.04); }
  .mvp-hero h1 { font-size: 26px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.02em; position: relative; }
  .mvp-hero p  { font-size: 14.5px; color: rgba(255,255,255,0.78); line-height: 1.8; margin: 0; max-width: 760px; position: relative; }
  .mvp-hero .en-sub { font-size: 12px; color: rgba(255,255,255,0.5); font-family: 'IBM Plex Sans', monospace; letter-spacing: 0.06em; margin-bottom: 14px; }

  /* Inline bilingual */
  .bi { display: flex; flex-direction: column; gap: 2px; }
  .bi .ar { font-size: 13.5px; font-weight: 500; color: var(--ink); }
  .bi .en { font-size: 11.5px; color: var(--ink-3); font-family: 'IBM Plex Sans', system-ui; direction: ltr; text-align: right; }

  /* Settings helper */
  .setting-row { display: flex; align-items: flex-start; gap: 14px; padding: 16px 22px; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .switch-demo { width: 42px; height: 24px; border-radius: 12px; background: var(--primary); position: relative; flex-shrink: 0; margin-top: 2px; }
  .switch-demo::after { content: ''; position: absolute; top: 3px; inset-inline-end: 3px; width: 18px; height: 18px; border-radius: 9px; background: #fff; }

  /* Scrollspy sidebar for desktop */
  .layout-with-toc { display: grid; grid-template-columns: 220px 1fr; gap: 36px; align-items: start; }
  @media (max-width: 900px) { .layout-with-toc { grid-template-columns: 1fr; } .toc { display: none; } }
  .toc { position: sticky; top: 80px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 0; }
  .toc-item { display: block; padding: 8px 18px; font-size: 13px; color: var(--ink-2); cursor: pointer; text-decoration: none; transition: all .12s; border-inline-start: 2.5px solid transparent; }
  .toc-item:hover { color: var(--ink); background: var(--bg); }
  .toc-item.active { color: var(--primary); font-weight: 600; border-inline-start-color: var(--primary); background: var(--primary-tint); }
  .toc-label { font-size: 10px; font-weight: 600; color: var(--ink-3); letter-spacing: 1px; text-transform: uppercase; padding: 10px 18px 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ── Icons (inline SVG) ───────────────────────────────────────

// ── Logo ────────────────────────────────────────────────────
function Logo({ size = 44 }) {
  return <img src="assets/sanad-logo.png" alt="سنــد" style={{ height: size, width: 'auto', display: 'block' }} />;
}

// ── Navigation Header ────────────────────────────────────────
function NavigationHeader() {
  const pages = [
    { key: 'main',     label: 'Sanad Design',    file: 'index.html' },
    { key: 'provider', label: 'Sanad Provider',  file: 'Sanad Provider.html' },
    { key: 'user',     label: 'Sanad User',      file: 'Sanad User.html' },
    { key: 'manager',  label: 'Sanad Manager',   file: 'Sanad Manager.html' },
    { key: 'mvp',      label: 'MVP',             file: 'MVP.html' },
  ];
  return (
    <div className="nav-header">
      <Logo size={30} />
      {pages.map(p => (
        <a key={p.key} href={p.file}
          className={'nav-link' + (p.key === 'mvp' ? ' active' : '')}>
          {p.label}
        </a>
      ))}
    </div>
  );
}

// ── Feature list item ────────────────────────────────────────
function Feat({ icon, color, children, en }) {
  return (
    <li>
      <div className="icon" style={{ background: color + '18', color }}>
        {icon}
      </div>
      <div className="bi">
        <span className="ar">{children}</span>
        {en && <span className="en">{en}</span>}
      </div>
    </li>
  );
}

// ── Status pill ──────────────────────────────────────────────
function Pill({ kind, children }) {
  return <span className={`pill ${kind}`}><span className="d" />{children}</span>;
}

// ── Role card ────────────────────────────────────────────────
function RoleCard({ icon, color, title, en, count, desc }) {
  return (
    <div className="card" style={{ overflow: 'hidden' }}>
      <div style={{ padding: '20px 22px', display: 'flex', alignItems: 'flex-start', gap: 16, borderBottom: '1px solid var(--border)' }}>
        <div style={{ width: 48, height: 48, borderRadius: 14, background: color + '18', color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: icon }} />
        </div>
        <div style={{ flex: 1 }}>
          <div className="bi">
            <span style={{ fontSize: 16, fontWeight: 700 }}>{title}</span>
            <span style={{ fontSize: 11.5, color: 'var(--ink-3)', fontFamily: 'IBM Plex Sans, system-ui', direction: 'ltr', textAlign: 'right' }}>{en}</span>
          </div>
        </div>
        <span style={{ fontSize: 12, fontWeight: 600, color, background: color + '14', padding: '3px 10px', borderRadius: 999 }}>{count} ميزة</span>
      </div>
      <div style={{ padding: '14px 22px', fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.7 }}>{desc}</div>
    </div>
  );
}

// ── Table of contents ────────────────────────────────────────

function TOC({ active }) {
  return (
    <div className="toc">
      <div className="toc-label">المحتويات · Contents</div>
      {SECTIONS.map(s => (
        <a key={s.id} href={'#' + s.id}
          className={'toc-item' + (active === s.id ? ' active' : '')}>
          <span>{s.ar}</span>
          <span style={{ display: 'block', fontSize: 10.5, color: 'var(--ink-3)', fontFamily: 'IBM Plex Sans, system-ui', direction: 'ltr' }}>{s.en}</span>
        </a>
      ))}
    </div>
  );
}

// ── Section wrapper ──────────────────────────────────────────
function Section({ id, ar, en, sub, enSub, children }) {
  return (
    <div id={id} className="section-gap" style={{ scrollMarginTop: 90 }}>
      <div className="bi" style={{ marginBottom: 18 }}>
        <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, letterSpacing: '-0.02em' }}>{ar}</h2>
        <span style={{ fontSize: 12, color: 'var(--ink-3)', fontFamily: 'IBM Plex Sans, system-ui', direction: 'ltr', display: 'block' }}>{en}</span>
      </div>
      {sub && <p style={{ fontSize: 13.5, color: 'var(--ink-2)', lineHeight: 1.8, margin: '0 0 22px', maxWidth: 720 }}>{sub}</p>}
      {children}
    </div>
  );
}
