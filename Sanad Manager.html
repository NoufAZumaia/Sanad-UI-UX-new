<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sanad Manager — لوحة الإدارة</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #F5F3EE;
    --bg-2: #EDE9DD;
    --surface: #FFFFFF;
    --surface-2: #FBF9F4;
    --border: #E5E0D2;
    --border-strong: #D7D0BC;
    --ink: #0F1414;
    --ink-2: #5C625F;
    --ink-3: #8A908C;
    --primary: #0F766E;
    --primary-deep: #0B5A55;
    --primary-soft: #CCFBF1;
    --primary-tint: #F0FDFA;
    --accent: #C9B79C;
    --accent-soft: #F0E9D9;
    --success: #047857;
    --success-soft: #D1FADF;
    --warn: #B45309;
    --warn-soft: #FEF3C7;
    --danger: #B91C1C;
    --danger-soft: #FECACA;
    --info: #1E3A8A;
    --info-soft: #DBE4FF;

    --fazaa: #0F766E;
    --jalees: #7A5A36;
    --academic: #1E3A8A;
    --murafaqa: #7A1E55;
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    direction: rtl;
  }
  * { box-sizing: border-box; }
  button { font: inherit; color: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
  .num { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }

  .app { display: grid; grid-template-rows: auto 1fr; grid-template-columns: 252px 1fr; min-height: 100vh; }
  .nav-header { 
    grid-column: 1 / -1;
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    gap: 20px; padding: 12px 24px;
    background: linear-gradient(135deg, #0F766E 0%, #0B5A55 100%);
    border-bottom: 2px solid #063D39;
    box-shadow: 0 4px 12px rgba(15, 118, 110, 0.15);
  }
  .nav-link { 
    padding: 8px 16px; border-radius: 8px; text-decoration: none;
    background: transparent;
    color: #fff; font-weight: 500; font-size: 14px;
    border: 1px solid transparent;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .nav-link:hover { background: rgba(255,255,255,0.15); }
  .nav-link.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.5); font-weight: 600; }
  .sidebar {
    background: linear-gradient(180deg, #0B5A55 0%, #0F2624 100%);
    color: #E8F3F1;
    padding: 22px 16px;
    display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .brand { display: flex; align-items: center; gap: 12px; padding: 4px 8px 22px; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 14px; }
  .brand img { height: 34px; width: auto; }
  .brand .b-title { font-weight: 600; font-size: 15px; letter-spacing: .2px; }
  .brand .b-sub { font-size: 11px; opacity: .7; margin-top: 2px; }

  .nav-section { font-size: 10px; letter-spacing: 1.5px; color: rgba(255,255,255,.45); padding: 14px 10px 8px; text-transform: uppercase; font-weight: 600; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; color: #C9DAD7; cursor: pointer; transition: all .15s; font-weight: 500; font-size: 13.5px; border: none; background: transparent; width: 100%; text-align: right; }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,.12); color: #fff; }
  .nav-item .ico { width: 18px; height: 18px; opacity: .85; flex-shrink: 0; }
  .nav-item .badge { margin-inline-start: auto; background: var(--accent); color: #1A1408; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; min-width: 22px; text-align: center; }

  .sidebar .footer { margin-top: auto; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.08); }
  .sidebar .me { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 12px; cursor: pointer; }
  .sidebar .me:hover { background: rgba(255,255,255,.06); }
  .me-avatar { width: 38px; height: 38px; border-radius: 999px; background: var(--accent); color: #1A1408; display: grid; place-items: center; font-weight: 600; font-size: 14px; }
  .me-name { font-size: 13.5px; font-weight: 500; }
  .me-role { font-size: 11px; opacity: .65; }

  /* Main */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 14px; padding: 16px 28px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
  .crumb { font-size: 12px; color: var(--ink-3); }
  .page-title { font-size: 20px; font-weight: 600; margin: 0; }
  .page-sub { font-size: 12.5px; color: var(--ink-2); margin-top: 2px; }
  .topbar .spacer { flex: 1; }
  .search { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; min-width: 280px; }
  .search input { border: 0; outline: 0; background: transparent; flex: 1; font-size: 13px; }
  .search kbd { font-family: 'IBM Plex Mono', monospace; background: var(--surface); border: 1px solid var(--border); padding: 1px 6px; border-radius: 6px; font-size: 10px; color: var(--ink-3); }
  .icon-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); display: grid; place-items: center; position: relative; transition: all .15s; }
  .icon-btn:hover { background: var(--bg); }
  .icon-btn .dot { position: absolute; top: 9px; left: 9px; width: 8px; height: 8px; background: var(--danger); border-radius: 999px; border: 2px solid var(--surface); }

  .content { padding: 28px; max-width: 1500px; margin: 0 auto; width: 100%; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; }
  .card-pad { padding: 22px; }
  .card-head { display: flex; align-items: center; gap: 12px; padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .card-head h3 { margin: 0; font-size: 15px; font-weight: 600; }
  .card-head .sub { color: var(--ink-2); font-size: 12px; }
  .card-head .actions { margin-inline-start: auto; display: flex; gap: 8px; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); font-weight: 500; font-size: 13px; transition: all .15s; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn.primary:hover { background: var(--primary-deep); }
  .btn.ghost { border-color: transparent; }
  .btn.sm { padding: 6px 12px; font-size: 12px; border-radius: 9px; }

  /* KPI tiles */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 22px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; position: relative; overflow: hidden; }
  .kpi .label { color: var(--ink-2); font-size: 12.5px; font-weight: 500; }
  .kpi .value { font-size: 32px; font-weight: 600; margin-top: 8px; letter-spacing: -.5px; }
  .kpi .delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 999px; margin-top: 8px; }
  .kpi .delta.up { background: var(--success-soft); color: var(--success); }
  .kpi .delta.down { background: var(--danger-soft); color: var(--danger); }
  .kpi .spark { position: absolute; left: 18px; top: 22px; width: 90px; height: 38px; opacity: .9; }

  /* Layout grids */
  .grid-2 { display: grid; grid-template-columns: 1.6fr 1fr; gap: 22px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  /* Status pills */
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 500; }
  .pill .d { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .pill.new { background: var(--info-soft); color: var(--info); }
  .pill.live { background: var(--primary-soft); color: var(--primary-deep); }
  .pill.assigned { background: var(--warn-soft); color: var(--warn); }
  .pill.done { background: var(--success-soft); color: var(--success); }
  .pill.cancelled { background: #F5E6E5; color: var(--danger); }
  .pill.on { background: var(--success-soft); color: var(--success); }
  .pill.off { background: #ECECEA; color: var(--ink-3); }

  .svc-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 999px; background: var(--bg-2); }
  .svc-tag .d { width: 7px; height: 7px; border-radius: 999px; }
  .svc-tag.fazaa .d { background: var(--fazaa); }
  .svc-tag.jalees .d { background: var(--jalees); }
  .svc-tag.academic .d { background: var(--academic); }
  .svc-tag.murafaqa .d { background: var(--murafaqa); }

  /* Tables */
  table.tbl { width: 100%; border-collapse: collapse; }
  .tbl th { text-align: right; font-size: 11px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .8px; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
  .tbl td { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: 0; }
  .tbl tr:hover td { background: var(--surface-2); }
  .tbl .id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-3); }
  .tbl .who { display: flex; align-items: center; gap: 10px; }
  .tbl .who .av { width: 30px; height: 30px; border-radius: 999px; background: var(--accent-soft); color: var(--ink); display: grid; place-items: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .tbl .who .name { font-weight: 500; }
  .tbl .who .meta { color: var(--ink-3); font-size: 11.5px; }

  /* Filters bar */
  .filters { display: flex; align-items: center; gap: 8px; padding: 14px 22px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: var(--bg); border: 1px solid var(--border); font-size: 12.5px; font-weight: 500; cursor: pointer; }
  .chip:hover { background: var(--surface-2); }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .chip .count { background: rgba(255,255,255,.18); padding: 1px 7px; border-radius: 999px; font-size: 11px; }
  .chip:not(.active) .count { background: var(--bg-2); }

  /* Map */
  .map { height: 380px; background:
      radial-gradient(circle at 30% 40%, rgba(15,118,110,.12) 0, transparent 35%),
      radial-gradient(circle at 70% 60%, rgba(122,90,54,.12) 0, transparent 35%),
      linear-gradient(180deg, #F0EDE3 0%, #E5DFCC 100%);
    border-radius: 18px; position: relative; overflow: hidden; border: 1px solid var(--border);
    background-image: 
      linear-gradient(rgba(15, 20, 20, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15, 20, 20, 0.04) 1px, transparent 1px),
      radial-gradient(circle at 30% 40%, rgba(15,118,110,.10) 0, transparent 35%),
      radial-gradient(circle at 70% 60%, rgba(122,90,54,.10) 0, transparent 35%),
      linear-gradient(180deg, #F0EDE3 0%, #E5DFCC 100%);
    background-size: 24px 24px, 24px 24px, auto, auto, auto;
  }
  .pin { position: absolute; transform: translate(50%, -100%); }
  .pin .head { width: 26px; height: 26px; border-radius: 999px; display: grid; place-items: center; color: #fff; font-size: 11px; font-weight: 600; box-shadow: 0 4px 12px rgba(0,0,0,.18); border: 2px solid #fff; }
  .pin .stem { width: 2px; height: 8px; background: rgba(0,0,0,.25); margin: 0 auto; }
  .pin.fazaa .head { background: var(--fazaa); }
  .pin.jalees .head { background: var(--jalees); }
  .pin.academic .head { background: var(--academic); }
  .pin.murafaqa .head { background: var(--murafaqa); }
  .pin .pulse { position: absolute; inset: -8px; border-radius: 999px; border: 2px solid currentColor; opacity: .35; animation: pulse 2.4s ease-out infinite; }
  @keyframes pulse { 0% { transform: scale(.6); opacity: .6; } 100% { transform: scale(1.6); opacity: 0; } }

  /* Activity feed */
  .activity { display: flex; flex-direction: column; }
  .act-row { display: flex; gap: 12px; padding: 12px 22px; border-bottom: 1px solid var(--border); }
  .act-row:last-child { border-bottom: 0; }
  .act-dot { width: 32px; height: 32px; border-radius: 999px; background: var(--bg-2); display: grid; place-items: center; flex-shrink: 0; }
  .act-text { flex: 1; font-size: 13px; line-height: 1.45; }
  .act-text b { font-weight: 600; }
  .act-time { color: var(--ink-3); font-size: 11.5px; margin-top: 2px; }

  /* Drawer / detail */
  .detail { display: grid; grid-template-columns: 1.4fr 1fr; gap: 22px; }
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-item { display: grid; grid-template-columns: 28px 1fr; gap: 12px; padding-bottom: 18px; position: relative; }
  .tl-item:not(:last-child)::before { content: ''; position: absolute; right: 13px; top: 28px; bottom: 0; width: 2px; background: var(--border); }
  .tl-dot { width: 28px; height: 28px; border-radius: 999px; background: var(--surface); border: 2px solid var(--border); display: grid; place-items: center; font-size: 11px; color: var(--ink-3); position: relative; z-index: 1; }
  .tl-dot.done { background: var(--primary); border-color: var(--primary); color: #fff; }
  .tl-dot.now { background: var(--surface); border-color: var(--primary); color: var(--primary); }
  .tl-dot.now::after { content: ''; position: absolute; inset: -5px; border-radius: 999px; border: 2px solid var(--primary); opacity: .35; animation: pulse 2s ease-out infinite; }
  .tl-content .ttl { font-weight: 500; font-size: 13.5px; }
  .tl-content .meta { color: var(--ink-3); font-size: 11.5px; margin-top: 2px; }

  /* Bars chart */
  .bars { display: flex; align-items: flex-end; gap: 8px; height: 180px; padding: 10px 0; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar-stack { width: 100%; display: flex; flex-direction: column; justify-content: flex-end; gap: 2px; height: 100%; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; }
  .bar-col .lbl { font-size: 10.5px; color: var(--ink-3); font-weight: 500; }

  /* Legend */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend .l { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-2); }
  .legend .l .d { width: 10px; height: 10px; border-radius: 3px; }

  /* Empty state for map dropdown badge */
  .badge-on-card { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,.92); border: 1px solid var(--border); padding: 6px 12px; border-radius: 999px; font-size: 11.5px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
  .badge-on-card .live-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--success); animation: pulse 2s ease-in-out infinite; }

  /* Profile card */
  .profile-card { display: flex; gap: 16px; align-items: center; padding: 22px; }
  .profile-card .av { width: 64px; height: 64px; border-radius: 999px; background: var(--accent-soft); display: grid; place-items: center; font-size: 22px; font-weight: 600; }

  /* Stats grid inside detail */
  .ministats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 1px solid var(--border); }
  .ministats .ms { padding: 18px; text-align: center; border-inline-end: 1px solid var(--border); }
  .ministats .ms:last-child { border-inline-end: 0; }
  .ministats .v { font-size: 20px; font-weight: 600; }
  .ministats .l { font-size: 11.5px; color: var(--ink-2); margin-top: 2px; }

  /* Definition list */
  .dl { display: grid; grid-template-columns: 130px 1fr; gap: 0; }
  .dl dt { padding: 10px 0; color: var(--ink-2); font-size: 12.5px; border-bottom: 1px solid var(--border); }
  .dl dd { padding: 10px 0; margin: 0; font-size: 13px; font-weight: 500; border-bottom: 1px solid var(--border); }
  .dl dt:last-of-type, .dl dd:last-of-type { border-bottom: 0; }

  /* Toggle */
  .switch { position: relative; width: 36px; height: 20px; background: var(--border); border-radius: 999px; cursor: pointer; transition: background .15s; flex-shrink: 0; }
  .switch::after { content: ''; position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; background: #fff; border-radius: 999px; transition: transform .15s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .switch.on { background: var(--primary); }
  .switch.on::after { transform: translateX(-16px); }

  /* tabs */
  .tabs { display: flex; gap: 22px; border-bottom: 1px solid var(--border); padding: 0 22px; }
  .tabs .t { padding: 12px 0; font-size: 13px; font-weight: 500; color: var(--ink-2); border-bottom: 2px solid transparent; cursor: pointer; }
  .tabs .t.active { color: var(--ink); border-bottom-color: var(--primary); }

  /* Custom scrollbar list */
  .scroll-list { max-height: 480px; overflow-y: auto; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

// ───── Logo ─────

// ───── Spark line (svg) ─────
const Spark = ({ pts, color }) => {
  const w = 90, h = 38;
  const max = Math.max(...pts), min = Math.min(...pts);
  const range = max - min || 1;
  const path = pts.map((p, i) => `${i ? 'L' : 'M'} ${(i / (pts.length - 1)) * w} ${h - ((p - min) / range) * h}`).join(' ');
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <path d={`${path} L ${w} ${h} L 0 ${h} Z`} fill={color} opacity=".12" />
      <path d={path} stroke={color} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

// ───── App ─────
function App() {
  const [page, setPage] = useState('dashboard');
  const [openReq, setOpenReq] = useState(null);

  let content;
  if (openReq) content = <RequestDetail req={openReq} onBack={() => setOpenReq(null)} />;
  else if (page === 'dashboard') content = <Dashboard />;
  else if (page === 'requests')  content = <Requests onOpen={setOpenReq} />;
  else if (page === 'dispatch')  content = <Dispatch />;
  else if (page === 'providers') content = <Providers />;
  else if (page === 'customers') content = <Customers />;
  else if (page === 'finance')   content = <Finance />;
  else if (page === 'reports')   content = <Reports />;
  else if (page === 'reviews')   content = <Reviews />;
  else if (page === 'settings')  content = <Settings />;

  return (
    <>
      <NavigationHeader currentPage="manager" />
      <div className="app">
        <Sidebar active={page} setActive={(p) => { setOpenReq(null); setPage(p); }} />
        <div className="main">{content}</div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
